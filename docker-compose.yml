services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - node_modules:/rails/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://constitution:constitution@postgres:5432/constitution_development
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=constitution_dev
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    env_file:
      - .env
    stdin_open: true
    tty: true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: constitution
      POSTGRES_PASSWORD: constitution
      POSTGRES_DB: constitution_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constitution"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/constitution_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/jobs
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://constitution:constitution@postgres:5432/constitution_development
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=constitution_dev
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    env_file:
      - .env

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  bundle:
  node_modules:
